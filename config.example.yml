  #     name: lazygit
  #     command: cd {{.RepoPath}} && lazygit
  # prs:
  #   - key: e
  #     builtin: enhance
  # actions:
  #   - key: t
  #     builtin: trigger

theme:
  colors:
    primary: "#7aa2f7"
    secondary: "#bb9af7"
    success: "#9ece6a"
    warning: "#e0af68"
    error: "#f7768e"
