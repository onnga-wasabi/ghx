name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          # このワークフローではリポジトリへの書き込みを行わないため、checkout 時に
          # Git 認証情報を残さない（不用意なトークン利用を防ぐ）。
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.25"

      - name: Build
        run: go build -o ghx ./cmd/ghx/main.go

      - name: Test
        run: go test -count=1 -race ./...
